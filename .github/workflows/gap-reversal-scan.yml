name: Gap Reversal Scan (Manual)

on:
  workflow_dispatch:  # Manual trigger only — gap reversal now runs in the EOD scan (daily-stock-alert.yml)

permissions:
  id-token: write
  contents: read

jobs:
  gap-reversal-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCS_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCS_SERVICE_ACCOUNT }}

      - name: Set environment variables
        run: |
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> $GITHUB_ENV
          echo "EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}" >> $GITHUB_ENV
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> $GITHUB_ENV

      - name: Refresh historical data (last month only — fast)
        run: |
          python scripts/refresh_data.py --period 1mo

      - name: Run Gap Reversal scan (manual / debug)
        run: |
          python main.py \
            --strategies GapReversal_Position \
            --label "Gap Reversal Manual Scan"

      # 🚨 Send failure alert email if any step above failed
      - name: Send failure alert
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_SENDER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Gap Reversal Manual Scan FAILED – ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_FAILURE_RECEIVER }}
          from: ${{ secrets.EMAIL_SENDER }}
          body: |
            The Gap Reversal morning scan workflow failed.

            Workflow: ${{ github.workflow }}
            Run ID:   ${{ github.run_id }}
            Branch:   ${{ github.ref_name }}
            Commit:   ${{ github.sha }}

            View logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
