name: Daily Stock Alerts

on:
  schedule:
    - cron: "0 22 * * 1-5"  # Every weekday at 10 PM UTC (~5 PM EST)
  workflow_dispatch:        # Allow manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  run-stock-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCS_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCS_SERVICE_ACCOUNT }}

      - name: Set environment variables
        run: |
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> $GITHUB_ENV
          echo "EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}" >> $GITHUB_ENV
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> $GITHUB_ENV

      - name: Refresh historical data
        run: |
          python scripts/refresh_data.py --period 1mo

      - name: Run stock alert scan
        run: |
          python main.py \
            --skip-strategies GapReversal_Position \
            --label "Evening Scan"

      # 🚨 Send failure alert email if any step above failed
      - name: Send failure alert
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_SENDER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Stock Alert GitHub Action FAILED – ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_FAILURE_RECEIVER }}
          from: ${{ secrets.EMAIL_SENDER }}
          body: |
            The daily stock alert workflow failed.

            Workflow: ${{ github.workflow }}
            Run ID:   ${{ github.run_id }}
            Branch:   ${{ github.ref_name }}
            Commit:   ${{ github.sha }}

            View logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
